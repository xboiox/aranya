upstream aranya_app {
    server app:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL certificates managed by Coolify (Let's Encrypt)
    # ssl_certificate     /data/coolify/proxy/certs/your-domain.com/fullchain.pem;
    # ssl_certificate_key /data/coolify/proxy/certs/your-domain.com/privkey.pem;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # GPS geolocation requires explicit permission
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    # HSTS — GPS + file upload membutuhkan HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── File Upload Limit ────────────────────────────────────────────────────
    # Untuk upload dokumen karyawan, bukti klaim, dll.
    client_max_body_size 20M;

    # ── Proxy ke Next.js ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://aranya_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout panjang untuk payroll batch calculation
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
    }

    # ── Next.js Static Assets ────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://aranya_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── PWA: Service Worker harus no-cache ───────────────────────────────────
    location /sw.js {
        proxy_pass http://aranya_app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location /workbox-*.js {
        proxy_pass http://aranya_app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
